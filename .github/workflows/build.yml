name: Build Multi-Platform Binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload artifacts to GitHub Release'
        required: false
        default: false
        type: boolean
      build_apk:
        description: 'Build Android APK'
        required: false
        default: false
        type: boolean
      apk_backend_url:
        description: 'Backend URL for APK (required if build_apk is true)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-frontend:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-web

      - name: Build Web
        working-directory: frontend
        run: flutter build web --base-href /

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: frontend/build/web/
          retention-days: 1

  build-backend:
    name: Build ${{ matrix.target }}
    needs: build-frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: gcc
          - target: linux-arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
          - target: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
          - target: darwin-amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
            cc: clang
          - target: darwin-arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            cc: clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: backend/web/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Install ARM64 cross-compiler
        if: matrix.goarch == 'arm64' && matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
        shell: bash

      - name: Build binary
        working-directory: backend
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -ldflags="-s -w" -o "class-form.exe" main.go
          else
            go build -ldflags="-s -w" -o "class-form" main.go
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: class-form-${{ matrix.target }}
          path: backend/class-form*
          retention-days: 14

  build-apk:
    name: Build Android APK
    needs: build-frontend
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && 
      inputs.build_apk == true &&
      inputs.apk_backend_url != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-apk

      - name: Build APK
        working-directory: frontend
        env:
          BACKEND_URL: ${{ inputs.apk_backend_url }}
        run: |
          flutter pub get
          flutter build apk --build-name=1.0.0 --build-number=1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: class-form-android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: [build-backend, build-apk]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.upload_to_release) || 
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
